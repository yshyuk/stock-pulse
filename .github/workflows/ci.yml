name: ci

# Lightweight PR validation on GitHub-hosted runners.
#
# Storage-conscious for the free tier: this workflow uploads NO artifacts and
# uses NO Actions cache, so it leaves ~0 bytes in Actions storage (only run
# logs are retained, which don't count toward the artifact/package quota).
# Trade-off: dependencies are re-downloaded each run, costing a little more
# build time instead of storage.
on:
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref to save minutes and avoid redundant logs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          # No `cache:` on purpose — keeps Actions cache storage at zero.

      - name: Build (includes tests)
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon
