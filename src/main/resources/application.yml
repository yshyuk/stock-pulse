# ── Common configuration (all profiles) ─────────────────────────────────────
# Secrets are injected via environment variables; nothing sensitive is committed.
# Default active profile is `local` so the app runs out of the box; launchd passes
# `--spring.profiles.active=prod` on the Mac Mini.
spring:
  application:
    name: stock-pulse
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  # Batch-style: the web server is kept minimal (reserved for a future read API) and the
  # process exits right after the run via BatchRunner. There is no @Scheduled here —
  # scheduling is owned by the OS (launchd).
  main:
    banner-mode: "off"

server:
  port: ${SERVER_PORT:8080}

stockpulse:
  # Where reports/YYYY-MM-DD.md is written. Override with STOCKPULSE_REPORT_DIR.
  report-dir: ${STOCKPULSE_REPORT_DIR:reports}
  # Reference value only — the real schedule lives in the launchd plist.
  run-hour: ${STOCKPULSE_RUN_HOUR:6}
  collector:
    dart:
      # When true (and an API key is set), DartDataSource pulls OpenDART disclosures.
      enabled: ${DART_ENABLED:false}
      api-key: ${DART_API_KEY:}
      lookback-days: ${DART_LOOKBACK_DAYS:1}
      max-items: ${DART_MAX_ITEMS:50}
  notification:
    telegram:
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}
    discord:
      webhook-url: ${DISCORD_WEBHOOK_URL:}
  analysis:
    # When true, AnthropicReportAnalyzer calls the Claude API for second-stage analysis.
    enabled: ${STOCKPULSE_ANALYSIS_ENABLED:false}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: ${STOCKPULSE_ANALYSIS_MODEL:claude-opus-4-8}

logging:
  level:
    com.stockpulse: INFO
