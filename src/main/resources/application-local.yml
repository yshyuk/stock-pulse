# ── local profile ───────────────────────────────────────────────────────────
# Uses an in-memory H2 database so the full pipeline runs end-to-end without MySQL.
spring:
  datasource:
    url: jdbc:h2:mem:stockpulse;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false

logging:
  level:
    com.stockpulse: DEBUG
